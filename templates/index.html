<!DOCTYPE html>
<html>
<head>
    <title>Cloud Data Deduplication System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

{% include 'sidebar.html' %}

<main class="main-content">
    <div class="container">
        <div class="card upload-card">
            <h1>Cloud Data Deduplication System</h1>
            <p class="subtitle">Upload a CSV file to detect duplicate records using SHA-256 hashing.</p>

            {% if error %}
                <div class="error">{{ error }}</div>
            {% endif %}

            <form action="/upload" method="POST" enctype="multipart/form-data" id="uploadForm">
                <label for="file-upload" class="drop-area" id="dropArea">
                    <div class="upload-icon">☁️</div>
                    <h2>Drag & Drop CSV File Here</h2>
                    <p>or click to browse your file</p>
                    <span id="file-name">No file selected</span>
                </label>

                <input id="file-upload" type="file" name="file" accept=".csv" required>

                <button type="submit" id="uploadBtn">Upload & Analyze</button>

                <div class="loader" id="loader">
                    <p>Analyzing file...</p>
                    <div class="progress-bar">
                        <div class="progress-fill loading-fill"></div>
                    </div>
                </div>
            </form>
        </div>
    </div>
</main>

<script>
const fileInput = document.getElementById("file-upload");
const fileName = document.getElementById("file-name");
const dropArea = document.getElementById("dropArea");
const form = document.getElementById("uploadForm");
const loader = document.getElementById("loader");
const uploadBtn = document.getElementById("uploadBtn");

fileInput.addEventListener("change", function () {
    if (this.files.length > 0) {
        fileName.textContent = this.files[0].name;
    }
});

dropArea.addEventListener("dragover", function(e) {
    e.preventDefault();
    dropArea.classList.add("active");
});

dropArea.addEventListener("dragleave", function() {
    dropArea.classList.remove("active");
});

dropArea.addEventListener("drop", function(e) {
    e.preventDefault();
    dropArea.classList.remove("active");

    if (e.dataTransfer.files.length > 0) {
        fileInput.files = e.dataTransfer.files;
        fileName.textContent = e.dataTransfer.files[0].name;
    }
});

form.addEventListener("submit", function() {
    loader.style.display = "block";
    uploadBtn.disabled = true;
    uploadBtn.textContent = "Processing...";
});
</script>

</body>
</html>
